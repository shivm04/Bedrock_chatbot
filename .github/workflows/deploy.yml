name: Deploy Bedrock Chatbot

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # ---------------------------
      # Checkout Repository
      # ---------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------
      # Configure AWS Credentials
      # ---------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ---------------------------
      # Install Python 3.12 (REQUIRED for SAM)
      # ---------------------------
      - name: Install Python 3.12
        run: |
          if ! command -v python3.12 &> /dev/null
          then
            echo "Installing Python 3.12..."
            sudo dnf install -y python3.12 python3.12-pip
          fi

          python3.12 --version

      # ---------------------------
      # Install AWS SAM CLI
      # ---------------------------
      - name: Install AWS SAM CLI
        run: |
          python3.12 -m pip install --user aws-sam-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ---------------------------
      # Verify Environment
      # ---------------------------
      - name: Verify Installation
        run: |
          which python3.12
          sam --version
          aws --version

      # ---------------------------
      # Build SAM Application
      # ---------------------------
      - name: SAM Build
        run: sam build

      # ---------------------------
      # Deploy Infrastructure
      # ---------------------------
      - name: Deploy SAM
        run: |
          sam deploy \
            --stack-name bedrock-chatbot \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --config-file /dev/null
      # ---------------------------
      # Fetch Stack Outputs
      # ---------------------------
      - name: Fetch Outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name bedrock-chatbot \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionURL'].OutputValue" \
            --output text)

          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name bedrock-chatbot \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)

          WEBSITE_URL=$(aws cloudformation describe-stacks \
            --stack-name bedrock-chatbot \
            --query "Stacks[0].Outputs[?OutputKey=='S3WebsiteURL'].OutputValue" \
            --output text)

          echo "API URL: $API_URL"
          echo "Bucket: $BUCKET_NAME"
          echo "Website: $WEBSITE_URL"

          echo "window.API_URL='$API_URL';" > frontend/config.js
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV

      # ---------------------------
      # Upload Frontend to S3
      # ---------------------------
      - name: Upload Frontend
        run: |
          aws s3 sync frontend s3://$BUCKET_NAME --delete

      # ---------------------------
      # Print Website URL
      # ---------------------------
      - name: Print Website URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name bedrock-chatbot \
            --query "Stacks[0].Outputs[?OutputKey=='S3WebsiteURL'].OutputValue" \
            --output text